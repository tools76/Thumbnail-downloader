<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result - Nazrul Tools- thumbnail downloader-youtube analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        .data-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #f1f5f9; position: relative; }
        .stat-box { text-align: center; padding: 15px; border-radius: 15px; background: #f8fafc; }
        .copy-btn { position: absolute; top: 15px; right: 15px; background: #ef4444; color: white; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #mainImg { transition: transform 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <div id="loader" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-red-600 mb-4"></div>
            <p class="text-gray-500 font-bold">সার্ভার থেকে তথ্য রিড করা হচ্ছে...</p>
        </div>

        <div id="mainContent" class="hidden">
            <div id="mediaBox" class="data-card text-center">
                <div class="relative inline-block mb-6">
                    <img id="mainImg" class="w-48 h-48 mx-auto rounded-full shadow-lg border-4 border-white object-cover bg-gray-100" src="" alt="Thumbnail/Logo">
                </div>
                <br>
                <button id="dlBtn" onclick="forceDownloadMedia()" class="bg-green-600 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-xl mb-6 shadow-md w-full sm:w-auto">HD মিডিয়া ডাউনলোড</button>
                
                <div class="text-left relative">
                    <button onclick="copyTextFromElement('vTitle')" class="copy-btn">COPY</button>
                    <h2 id="titleLabel" class="text-red-600 font-bold text-lg mb-1">নাম/টাইটেল:</h2>
                    <p id="vTitle" class="text-gray-800 font-bold text-xl pr-16 mb-3"></p>
                    
                    <div id="videoMeta" class="flex flex-wrap gap-4 mt-2 p-3 bg-red-50 rounded-xl">
                        <div class="text-sm">ভিউ: <span id="vViews" class="font-bold text-red-600">0</span></div>
                        <div id="likeSection" class="text-sm">লাইক: <span id="vLikes" class="font-bold text-red-600">0</span></div>
                    </div>
                </div>
            </div>

            <div id="channelStats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="stat-box border-b-4 border-blue-500">
                    <span class="text-xs text-gray-500 uppercase font-bold">Subscribers</span>
                    <div id="cSubs" class="text-xl font-bold text-gray-800">0</div>
                </div>
                <div class="stat-box border-b-4 border-red-500">
                    <span class="text-xs text-gray-500 uppercase font-bold">Total Views</span>
                    <div id="cViews" class="text-xl font-bold text-gray-800">0</div>
                </div>
                <div class="stat-box border-b-4 border-yellow-500">
                    <span class="text-xs text-gray-500 uppercase font-bold">Videos</span>
                    <div id="cVids" class="text-xl font-bold text-gray-800">0</div>
                </div>
                <div class="stat-box border-b-4 border-green-500">
                    <span class="text-xs text-gray-500 font-bold uppercase">Monthly Income</span>
                    <div id="cIncome" class="text-xl font-bold text-green-600">$0 - $0</div>
                </div>
            </div>

            <div id="tagCard" class="data-card">
                <button onclick="copyTextFromElement('vTags')" class="copy-btn">COPY</button>
                <h3 class="font-bold text-red-600 mb-2">ভিডিও ট্যাগ:</h3>
                <div id="vTags" class="text-sm text-gray-600 bg-gray-50 p-4 rounded-xl italic pr-16 min-h-[50px]"></div>
            </div>

            <div class="data-card">
                <button onclick="copyTextFromElement('cKeywords')" class="copy-btn">COPY</button>
                <h3 class="font-bold text-blue-600 mb-2">চ্যানেল কিওয়ার্ড:</h3>
                <div id="cKeywords" class="text-sm text-gray-600 bg-gray-50 p-4 rounded-xl italic pr-16 min-h-[50px]"></div>
            </div>

            <div class="data-card">
                <button onclick="copyTextFromElement('vDesc')" class="copy-btn">COPY</button>
                <h3 id="descLabel" class="font-bold text-red-600 mb-2">ডেসক্রিপশন/বায়ো:</h3>
                <textarea id="vDesc" readonly class="w-full h-48 bg-gray-50 p-4 text-xs text-gray-600 rounded-xl outline-none border-none resize-none"></textarea>
            </div>

            <div class="text-center mt-6">
                <a href="index.html" class="text-gray-500 underline font-bold">আরেকটি সার্চ করুন</a>
            </div>
        </div>
    </div>

    <textarea id="tempInput" style="position: absolute; left: -9999px;"></textarea>

    <script>
        const API_KEY = 'AIzaSyBvSbU2JjdRttm9-u1DxCmL3-BD_Wlo46E';
        let mediaUrl = "";
        let finalFileName = "download.jpg";

        window.onload = async function() {
            const targetUrl = localStorage.getItem('ytTargetUrl');
            if(!targetUrl) { window.location.href = 'index.html'; return; }

            try {
                if (targetUrl.includes('watch?v=') || targetUrl.includes('youtu.be/') || targetUrl.includes('shorts/')) {
                    await loadVideoData(targetUrl);
                } else {
                    await loadChannelData(targetUrl);
                }
            } catch (error) {
                console.error(error);
                alert("তথ্য লোড করতে সমস্যা হয়েছে। দয়া করে সঠিক লিংক দিন।");
                window.location.href = 'index.html';
            }
        };

        async function loadVideoData(url) {
            let vId = "";
            if (url.includes('v=')) vId = url.split('v=')[1].split('&')[0];
            else if (url.includes('shorts/')) vId = url.split('shorts/')[1].split('?')[0];
            else vId = url.split('/').pop().split('?')[0];

            const response = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${vId}&key=${API_KEY}`);
            const data = await response.json();
            const video = data.items[0];

            // ইমেজ সেটআপ
            const mainImg = document.getElementById('mainImg');
            mainImg.classList.remove('rounded-full');
            mainImg.classList.add('rounded-xl', 'w-full', 'h-auto');
            
            mediaUrl = `https://i.ytimg.com/vi/${vId}/maxresdefault.jpg`;
            mainImg.src = mediaUrl;
            finalFileName = `thumb-${vId}.jpg`;

            document.getElementById('vTitle').innerText = video.snippet.title;
            document.getElementById('vTags').innerText = video.snippet.tags ? video.snippet.tags.join(', ') : 'No Tags Found';
            document.getElementById('vDesc').value = video.snippet.description;
            document.getElementById('vViews').innerText = Number(video.statistics.viewCount).toLocaleString();
            document.getElementById('vLikes').innerText = video.statistics.likeCount ? Number(video.statistics.likeCount).toLocaleString() : "N/A";

            await loadStats(video.snippet.channelId);
            finishLoading();
        }

        async function loadChannelData(url) {
            let queryPath = "";
            if (url.includes('/@')) {
                const handle = url.split('/@')[1].split('/')[0].split('?')[0];
                queryPath = `forHandle=${handle}`;
            } else if (url.includes('/channel/')) {
                const id = url.split('/channel/')[1].split('/')[0].split('?')[0];
                queryPath = `id=${id}`;
            }

            const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&${queryPath}&key=${API_KEY}`);
            const data = await response.json();
            const channel = data.items[0];

            mediaUrl = channel.snippet.thumbnails.high.url;
            document.getElementById('mainImg').src = mediaUrl;
            finalFileName = `channel-logo-${channel.id}.jpg`;

            document.getElementById('titleLabel').innerText = "চ্যানেলের নাম:";
            document.getElementById('vTitle').innerText = channel.snippet.title;
            document.getElementById('descLabel').innerText = "চ্যানেল বায়ো:";
            document.getElementById('vDesc').value = channel.snippet.description;
            
            document.getElementById('tagCard').style.display = 'none';
            document.getElementById('likeSection').style.display = 'none';

            updateStatsUI(channel);
            finishLoading();
        }

        async function loadStats(cId) {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&id=${cId}&key=${API_KEY}`);
            const data = await res.json();
            updateStatsUI(data.items[0]);
        }

        function updateStatsUI(chan) {
            document.getElementById('cSubs').innerText = Number(chan.statistics.subscriberCount).toLocaleString();
            document.getElementById('cViews').innerText = Number(chan.statistics.viewCount).toLocaleString();
            document.getElementById('cVids').innerText = chan.statistics.videoCount;

            const keywords = chan.brandingSettings?.channel?.keywords;
            document.getElementById('cKeywords').innerText = keywords ? keywords : 'No Channel Keywords';

            // ইনকাম লজিক
            const totalV = Number(chan.statistics.viewCount);
            const vCount = Number(chan.statistics.videoCount) || 1;
            const monthlyEst = (totalV / vCount) * 2; 
            const min = (monthlyEst / 1000) * 0.25;
            const max = (monthlyEst / 1000) * 3.50;
            document.getElementById('cIncome').innerText = `$${Math.floor(min)} - $${Math.floor(max)}`;
        }

        async function forceDownloadMedia() {
            const btn = document.getElementById('dlBtn');
            btn.innerText = "প্রসেসিং হচ্ছে...";
            try {
                // সরাসরি ডাউনলোড করার জন্য ইমেজ ব্লব ট্রিক
                const imgData = await fetch(mediaUrl);
                const blob = await imgData.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = finalFileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } catch (e) {
                // যদি fetch এ সমস্যা হয় (CORS), তবে নিউ ট্যাবে ওপেন হবে
                window.open(mediaUrl, '_blank');
            }
            btn.innerText = "HD মিডিয়া ডাউনলোড";
        }

        function finishLoading() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }

        function copyTextFromElement(id) {
            const el = document.getElementById(id);
            const temp = document.getElementById('tempInput');
            temp.value = (el.tagName === 'TEXTAREA') ? el.value : el.innerText;
            temp.select();
            document.execCommand('copy');
            alert("সফলভাবে কপি হয়েছে!");
        }
    </script>
</body>
</html>
