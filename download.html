<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Your HD Thumbnail - Nazrul Tools</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7690803775663030" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4 flex flex-col items-center">

    <div class="max-w-3xl w-full bg-white p-6 md:p-8 rounded-3xl shadow-xl text-center">
        <h2 class="text-2xl font-bold text-green-600 mb-6">আপনার থাম্বনেইল প্রস্তুত!</h2>

        <div id="loading" class="text-blue-500 font-bold my-10 text-xl italic">প্রসেসিং হচ্ছে...</div>
        
        <div id="previewContainer" class="hidden">
            <div class="relative group">
                <img id="thumbImage" src="" class="w-full rounded-2xl shadow-lg border-4 border-white mb-6" alt="HD Thumbnail">
                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-10 transition rounded-2xl"></div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center mt-6">
                <button onclick="forceDownload()" class="bg-green-600 hover:bg-green-700 text-white font-bold px-10 py-4 rounded-2xl shadow-lg transition text-lg flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    HD ডাউনলোড করুন
                </button>
                <a href="index.html" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold px-10 py-4 rounded-2xl transition flex items-center justify-center">
                    আবার চেষ্টা করুন
                </a>
            </div>
        </div>

        <div class="my-10">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7690803775663030"
                 data-ad-slot="5826413062"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>

    <script>
        let finalImageUrl = "";

        window.onload = function() {
            const link = localStorage.getItem('targetUrl');
            const thumbImg = document.getElementById('thumbImage');
            const loading = document.getElementById('loading');
            const container = document.getElementById('previewContainer');

            if (!link) {
                window.location.href = 'index.html';
                return;
            }

            let videoId = "";
            if (link.includes('youtube.com/watch?v=')) {
                videoId = link.split('v=')[1].split('&')[0];
            } else if (link.includes('youtu.be/')) {
                videoId = link.split('/').pop().split('?')[0];
            } else if (link.includes('youtube.com/shorts/')) {
                videoId = link.split('shorts/')[1].split('?')[0];
            }

            if (videoId) {
                // সরাসরি ইমেজ না নিয়ে প্রক্সি ব্যবহার করছি যাতে ডাউনলোড হয়
                finalImageUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                
                // ইমেজ চেক করা (যদি HD না থাকে তবে HQ লোড হবে)
                const img = new Image();
                img.src = finalImageUrl;
                img.onload = () => {
                    if (img.width === 120) { // ইউটিউব ডিফল্ট এরর ইমেজ উইডথ ১২০ হয়
                        finalImageUrl = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                        thumbImg.src = finalImageUrl;
                    } else {
                        thumbImg.src = finalImageUrl;
                    }
                    loading.classList.add('hidden');
                    container.classList.remove('hidden');
                };
            } else {
                alert("দুঃখিত, সঠিক ইউটিউব লিঙ্ক পাওয়া যায়নি!");
                window.location.href = 'index.html';
            }
        };

        // এই ফাংশনটি ফাইলটিকে সরাসরি ডাউনলোড করতে বাধ্য করবে
        async function forceDownload() {
            try {
                const response = await fetch(finalImageUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'NazrulTools_HD_Thumbnail.jpg';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                // যদি ব্রাউজার ব্লক করে তবে ব্যাকআপ হিসেবে নতুন ট্যাবে ওপেন হবে
                window.open(finalImageUrl, '_blank');
            }
        }
    </script>
</body>
</html>
